<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新聞蒐集工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-hint: #999;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --accent-text: #1d4ed8;
      --radius: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Lock screen ── */
    #lock-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .lock-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .lock-icon {
      font-size: 36px;
      margin-bottom: 1rem;
    }

    .lock-card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .lock-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .pin-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      background: transparent;
      transition: background 0.15s;
    }

    .pin-dot.filled {
      background: var(--accent);
      border-color: var(--accent);
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }

    .num-btn {
      height: 52px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      font-size: 20px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      transition: background 0.1s;
    }

    .num-btn:hover { background: var(--bg); }
    .num-btn:active { background: #e5e5e5; }

    .num-btn.del {
      font-size: 16px;
      color: var(--text-muted);
    }

    .lock-error {
      font-size: 13px;
      color: #dc2626;
      min-height: 18px;
      margin-top: -0.5rem;
    }

    /* ── Main app (hidden until unlocked) ── */
    #app { display: none; }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    header p { font-size: 14px; color: var(--text-muted); }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 1.25rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input[type="text"], select {
      width: 100%;
      height: 40px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 0 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .tag-area {
      min-height: 40px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 6px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      cursor: text;
      margin-bottom: 8px;
      background: var(--surface);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-bg);
      color: var(--accent-text);
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 99px;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      opacity: 0.5;
    }

    .tag button:hover { opacity: 1; }

    .tag-hint { font-size: 13px; color: var(--text-hint); }

    .add-tag-row { display: flex; gap: 8px; }
    .add-tag-row input { flex: 1; }

    .btn-add {
      height: 40px;
      padding: 0 16px;
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
      transition: background 0.1s;
    }

    .btn-add:hover { background: var(--bg); }

    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 1.25rem 0;
    }

    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

    .region-group {
      width: 100%;
      font-size: 11px;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 8px 0 4px;
    }

    .region-group:first-child { margin-top: 0; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-family: inherit;
      padding: 5px 13px;
      border-radius: 99px;
      border: 0.5px solid var(--border-strong);
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: all 0.12s;
    }

    .chip:hover { background: #eee; }

    .chip.selected {
      background: var(--accent-bg);
      color: var(--accent-text);
      border-color: transparent;
    }

    .btn-search {
      width: 100%;
      height: 48px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-top: 1.5rem;
    }

    .btn-search:hover { background: #1d4ed8; }
    .btn-search:active { transform: scale(0.99); }

    .result-panel {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1.5rem;
      display: none;
    }

    .result-panel.visible { display: block; }

    .result-panel h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .prompt-box {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 1rem;
    }

    .copy-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-copy, .btn-claude {
      height: 38px;
      padding: 0 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-copy {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      color: var(--text);
    }

    .btn-copy:hover { background: var(--bg); }

    .btn-claude {
      background: #7c3aed;
      border: none;
      color: #fff;
      text-decoration: none;
    }

    .btn-claude:hover { background: #6d28d9; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Lock Screen -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h2>請輸入密碼</h2>
      <p>輸入 4 位數字密碼以繼續</p>
      <div class="pin-row" id="pin-row">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>
      <div class="numpad">
        <button class="num-btn" onclick="pressNum('1')">1</button>
        <button class="num-btn" onclick="pressNum('2')">2</button>
        <button class="num-btn" onclick="pressNum('3')">3</button>
        <button class="num-btn" onclick="pressNum('4')">4</button>
        <button class="num-btn" onclick="pressNum('5')">5</button>
        <button class="num-btn" onclick="pressNum('6')">6</button>
        <button class="num-btn" onclick="pressNum('7')">7</button>
        <button class="num-btn" onclick="pressNum('8')">8</button>
        <button class="num-btn" onclick="pressNum('9')">9</button>
        <button class="num-btn" onclick="pressNum('0')" style="grid-column:2">0</button>
        <button class="num-btn del" onclick="pressDelete()">⌫</button>
      </div>
      <div class="lock-error" id="lock-error"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <div class="container">
      <header>
        <h1>📰 新聞蒐集工具</h1>
        <p>輸入人名與議題關鍵字，自動產生搜尋指令，貼到 Claude 即可蒐集新聞</p>
      </header>

      <div class="card">
        <div class="row-2">
          <div class="field">
            <label>人名</label>
            <input type="text" id="person-input" placeholder="例：馬英九、黃仁勳" />
          </div>
          <div class="field">
            <label>時間範圍</label>
            <select id="time-range">
              <option value="過去十年">過去十年</option>
              <option value="過去五年">過去五年</option>
              <option value="過去三年">過去三年</option>
              <option value="過去一年">過去一年</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>議題關鍵字（可新增多個）</label>
          <div class="tag-area" id="tags-area" onclick="document.getElementById('tag-input').focus()">
            <span class="tag-hint" id="tags-hint">尚未新增關鍵字</span>
          </div>
          <div class="add-tag-row">
            <input type="text" id="tag-input" placeholder="輸入關鍵字後按 Enter 或點新增" />
            <button class="btn-add" onclick="addTag()">＋ 新增</button>
          </div>
        </div>

        <hr class="divider" />

        <div class="field">
          <div class="section-title">新聞來源地區（可複選）</div>
          <div class="chip-group" id="region-chips">
            <div class="region-group">亞洲</div>
            <span class="chip selected" data-val="台灣" onclick="toggleChip(this,'region')">🇹🇼 台灣</span>
            <span class="chip" data-val="中國" onclick="toggleChip(this,'region')">🇨🇳 中國</span>
            <span class="chip" data-val="香港" onclick="toggleChip(this,'region')">🇭🇰 香港</span>
            <span class="chip" data-val="日本" onclick="toggleChip(this,'region')">🇯🇵 日本</span>
            <span class="chip" data-val="新加坡" onclick="toggleChip(this,'region')">🇸🇬 新加坡</span>
            <div class="region-group">美洲</div>
            <span class="chip" data-val="美國" onclick="toggleChip(this,'region')">🇺🇸 美國</span>
            <div class="region-group">歐洲</div>
            <span class="chip" data-val="歐洲" onclick="toggleChip(this,'region')">🇪🇺 歐洲</span>
            <span class="chip" data-val="英國" onclick="toggleChip(this,'region')">🇬🇧 英國</span>
            <span class="chip" data-val="德國" onclick="toggleChip(this,'region')">🇩🇪 德國</span>
            <span class="chip" data-val="荷蘭" onclick="toggleChip(this,'region')">🇳🇱 荷蘭</span>
            <span class="chip" data-val="法國" onclick="toggleChip(this,'region')">🇫🇷 法國</span>
            <span class="chip" data-val="西班牙" onclick="toggleChip(this,'region')">🇪🇸 西班牙</span>
            <span class="chip" data-val="義大利" onclick="toggleChip(this,'region')">🇮🇹 義大利</span>
            <div class="region-group">不限</div>
            <span class="chip" data-val="不限地區" onclick="toggleChip(this,'region')">🌐 不限</span>
          </div>
        </div>

        <div class="field">
          <div class="section-title">新聞語言（可複選）</div>
          <div class="chip-group" id="lang-chips">
            <span class="chip selected" data-val="繁體中文" onclick="toggleChip(this,'lang')">繁中</span>
            <span class="chip" data-val="簡體中文" onclick="toggleChip(this,'lang')">简中</span>
            <span class="chip" data-val="英文" onclick="toggleChip(this,'lang')">EN</span>
            <span class="chip" data-val="日文" onclick="toggleChip(this,'lang')">日本語</span>
            <span class="chip" data-val="德文" onclick="toggleChip(this,'lang')">DE</span>
            <span class="chip" data-val="法文" onclick="toggleChip(this,'lang')">FR</span>
            <span class="chip" data-val="不限語言" onclick="toggleChip(this,'lang')">🌐 不限</span>
          </div>
        </div>

        <button class="btn-search" onclick="generatePrompt()">
          🔍 產生搜尋指令
        </button>
      </div>

      <div class="result-panel" id="result-panel">
        <h2>搜尋指令已產生</h2>
        <div class="prompt-box" id="prompt-box"></div>
        <div class="copy-row">
          <button class="btn-copy" onclick="copyPrompt()">📋 複製指令</button>
          <a class="btn-claude" href="https://claude.ai" target="_blank" rel="noopener">前往 Claude 貼上 ↗</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已複製到剪貼簿 ✓</div>

  <script>
    /* ── Password ── */
    const CORRECT = '0213';
    let entered = '';

    function pressNum(n) {
      if (entered.length >= 4) return;
      entered += n;
      updateDots();
      if (entered.length === 4) checkPassword();
    }

    function pressDelete() {
      entered = entered.slice(0, -1);
      updateDots();
      document.getElementById('lock-error').textContent = '';
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('dot-' + i).classList.toggle('filled', i < entered.length);
      }
    }

    function checkPassword() {
      if (entered === CORRECT) {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      } else {
        document.getElementById('lock-error').textContent = '密碼錯誤，請重試';
        entered = '';
        updateDots();
        for (let i = 0; i < 4; i++) {
          const dot = document.getElementById('dot-' + i);
          dot.style.borderColor = '#dc2626';
          setTimeout(() => { dot.style.borderColor = ''; }, 600);
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('lock-screen').style.display === 'none') return;
      if (e.key >= '0' && e.key <= '9') pressNum(e.key);
      if (e.key === 'Backspace') pressDelete();
    });

    /* ── App ── */
    let tags = [];

    function addTag() {
      const input = document.getElementById('tag-input');
      const val = input.value.trim();
      if (!val || tags.includes(val)) { input.value = ''; return; }
      tags.push(val);
      renderTags();
      input.value = '';
    }

    function removeTag(t) {
      tags = tags.filter(x => x !== t);
      renderTags();
    }

    function renderTags() {
      const area = document.getElementById('tags-area');
      const hint = document.getElementById('tags-hint');
      area.innerHTML = '';
      if (tags.length === 0) {
        hint.textContent = '尚未新增關鍵字';
        area.appendChild(hint);
        return;
      }
      tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.innerHTML = `${t} <button onclick="removeTag('${t}')" aria-label="移除">×</button>`;
        area.appendChild(span);
      });
    }

    document.getElementById('tag-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addTag(); }
    });

    function toggleChip(el, group) {
      const isUnlimited = el.dataset.val.startsWith('不限');
      const groupId = group === 'region' ? 'region-chips' : 'lang-chips';
      const chips = [...document.querySelectorAll(`#${groupId} .chip`)];
      if (isUnlimited) {
        chips.forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        return;
      }
      const unlimitChip = chips.find(c => c.dataset.val.startsWith('不限'));
      if (unlimitChip) unlimitChip.classList.remove('selected');
      el.classList.toggle('selected');
      const anySelected = chips.filter(c => c.classList.contains('selected')).length > 0;
      if (!anySelected && unlimitChip) unlimitChip.classList.add('selected');
    }

    function getSelected(groupId) {
      return [...document.querySelectorAll(`#${groupId} .chip.selected`)].map(c => c.dataset.val);
    }

    function generatePrompt() {
      const person = document.getElementById('person-input').value.trim();
      const timeRange = document.getElementById('time-range').value;
      if (!person) { alert('請輸入人名'); return; }
      if (tags.length === 0) { alert('請至少新增一個議題關鍵字'); return; }

      const regions = getSelected('region-chips');
      const langs = getSelected('lang-chips');
      const keywordsStr = tags.join('、');
      const regionStr = regions.includes('不限地區') ? '不限地區' : regions.join('、');
      const langStr = langs.includes('不限語言') ? '不限語言' : langs.join('、');

      const prompt =
`請幫我蒐集新聞報導，條件如下：
- 人名：${person}
- 議題關鍵字：${keywordsStr}
- 時間範圍：${timeRange}
- 新聞來源地區：${regionStr}
- 新聞語言：${langStr}

請用網路搜尋找出符合條件的重要新聞報導，盡量找 10 則以上，依時間由近到遠排序。

每則新聞請只列出以下欄位，不需要摘要：
- 標題
- 來源媒體與地區
- 日期
- 語言
- 連結（必須是可以實際 access 的真實網址）`;

      document.getElementById('prompt-box').textContent = prompt;
      const panel = document.getElementById('result-panel');
      panel.classList.add('visible');
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyPrompt() {
      const text = document.getElementById('prompt-box').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }
  </script>
</body>
</html>
